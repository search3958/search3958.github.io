    *{
        font-family: "Google Sans Flex", "Noto Sans KR",sans-serif;
            line-height: 1.5 !important;
    }
    body{
        padding:0;
        margin:0;

    }
.first{
    background:#69ffb4;
    background-image: 
    conic-gradient(from 45deg, #000000 0deg, #00FF8200 45deg), conic-gradient(from -45deg, #a8ffeb 0deg, #C3FF0000 45deg), conic-gradient(from 135deg, #e7fff9 0deg, #00FF4400 45deg), conic-gradient(from -135deg, #f8ffa7 0deg, #00FF4400 45deg);
    padding:48px;
    text-align:center;
    font-weight:bold;
    font-size:40px;
    position:relative;
    height: 144px;
    overflow:hidden;
    padding-top:80px;

}
.first:before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background-image: conic-gradient(from 180deg, #00C464 0deg, #00FF8200 45deg), conic-gradient(from 0deg, #9AFF8C 0deg, #C3FF0000 45deg), conic-gradient(from 90deg, #ACEAFF 0deg, #00FF4400 45deg), conic-gradient(from -90deg, #51FCFF 0deg, #00FF4400 45deg);
    mix-blend-mode: overlay;
    

}
.small{
    font-size:16px;
    opacity:0.7;
    transition: 1.5s all cubic-bezier(1,0,.18,1);
    padding-top:0px;
    font-weight:400;
    font-variation-settings:
    "slnt" 0,
    "wdth" 100,
    "GRAD" 0,
    "ROND" 0;

}
.small.before{
    font-size:48px;
    opacity:1;
    padding-top:48px;
    font-weight:bold;
    font-variation-settings:
    "slnt" 0,
    "wdth" 160,
    "GRAD" 0,
    "ROND" 40;

}
.message{
    transition: 2s all cubic-bezier(.06,.37,0,1),1s filter cubic-bezier(.19,.08,0,1);
    opacity:1;
    filter:blur(0px);
    display:block;
    transform:translateY(0px);
    transition-delay:0.7s
}
.message.before{
    opacity:0;
    filter:blur(16px);
    transform:translateY(120px);
}


.xincard{
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:24px;
    gap:4px;
    flex-direction: column;
    font-weight:bold;
    text-align:center;
    font-size:32px;
    background-image: linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(207, 217, 232, 1));
}
.app-icon{
    border-radius:100px;
    height:52px;
    width:52px;
    border-radius:100px;
    background:#fff;
}
.app-image{
    width:70vw;
}
.app-name{
    display:inline-block;
}
.goodcard{ 

    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:24px;
    text-align:center;
    gap:4px;
    font-size:32px;
    flex-direction: column;
    background-image: radial-gradient(circle at 50% 190%, rgba(0, 13, 25, 1), rgb(0 122 82) 66%, rgb(0 128 82) 73%, rgb(0 117 79) 80%, rgb(0 92 71) 87%, rgba(0, 13, 25, 1));
    color:#fff;
    padding-bottom:24px;
    }
    .goodxiao{
      padding:24px 32px;
      border-radius:100px;
      background-color:color(display-p3 0.4 1 0.573 / 1);
      font-weight:bold;
      color:#000;
    }
    .goodxiao.white{
      background-color:#fff;
      border-radius:12px;
      padding:24px;
    }
    .primary-btn{
      padding:8px 16px;
      border-radius:100px;
      font-weight:bold;
      border:none;
    }
    header{
      position:fixed;
      background:#fffb;
      color:#000;
      top:0;
      left:0;
      width:100vw;
      z-index:9999;
      display:flex;
      justify-content:center;
      align-items:center;
      backdrop-filter:blur(16px);
      padding:12px 0;
      gap:24px;
      font-size:13px;
    }
    a{
          text-decoration: none;
        color:#000;
    }
    .product-section{
      padding:64px 20px;
      text-align:left;
    }
    .product-title{
      max-width:1040px;
      margin:0 auto;
      font-size:40px;
      font-weight:700;
      font-variation-settings:
      "slnt" 0,
      "wdth" 120,
      "GRAD" 0,
      "ROND" 24;
    }
    .product-grid{
      max-width:1040px;
      margin:28px auto 0;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
      gap:12px;
    }
    .product-link{
      background:#eff0f1;
      border-radius:100px;
      padding:12px 14px;
      display:grid;
      grid-template-columns:56px 1fr;
      align-items:center;
      gap:12px;
      transition:transform .25s ease, box-shadow .25s ease;
    }
    .product-link:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 24px #00000005;
    }
    .product-link img{
      width:56px;
      height:56px;
      border-radius:100px;
      object-fit:cover;
      background:#fff
    }
    .product-label{
      font-size:17px;
      font-weight:700;
      color:#12201d;
      text-align:left;
      line-height:1.3;
    }
    @media (max-width:720px){
      .product-title{
        font-size:32px;
      }
      .product-grid{
        grid-template-columns:1fr;
      }
    }
    footer{
      padding:48px 0px;
      text-align:center;
      font-size:20px;

    }
</style>
