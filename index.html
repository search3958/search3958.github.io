    *{
        font-family: "Google Sans Flex", "Noto Sans KR",sans-serif;
            line-height: 1.5 !important;
    }
    body{
        padding:0;
        margin:0;

    }
.first{
    background:#69ffb4;
    background-image: 
    conic-gradient(from 45deg, #000000 0deg, #00FF8200 45deg), conic-gradient(from -45deg, #a8ffeb 0deg, #C3FF0000 45deg), conic-gradient(from 135deg, #e7fff9 0deg, #00FF4400 45deg), conic-gradient(from -135deg, #f8ffa7 0deg, #00FF4400 45deg);
    padding:48px;
    text-align:center;
    font-weight:bold;
    font-size:40px;
    position:relative;
    height: 144px;
    overflow:hidden;
    padding-top:80px;

}
.first:before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background-image: conic-gradient(from 180deg, #00C464 0deg, #00FF8200 45deg), conic-gradient(from 0deg, #9AFF8C 0deg, #C3FF0000 45deg), conic-gradient(from 90deg, #ACEAFF 0deg, #00FF4400 45deg), conic-gradient(from -90deg, #51FCFF 0deg, #00FF4400 45deg);
    mix-blend-mode: overlay;
    

}
.small{
    font-size:16px;
    opacity:0.7;
    transition: 1.5s all cubic-bezier(1,0,.18,1);
    padding-top:0px;
    font-weight:400;
    font-variation-settings:
    "slnt" 0,
    "wdth" 100,
    "GRAD" 0,
    "ROND" 0;

}
.small.before{
    font-size:48px;
    opacity:1;
    padding-top:48px;
    font-weight:bold;
    font-variation-settings:
    "slnt" 0,
    "wdth" 160,
    "GRAD" 0,
    "ROND" 40;

}
.message{
    transition: 2s all cubic-bezier(.06,.37,0,1),1s filter cubic-bezier(.19,.08,0,1);
    opacity:1;
    filter:blur(0px);
    display:block;
    transform:translateY(0px);
    transition-delay:0.7s
}
.message.before{
    opacity:0;
    filter:blur(16px);
    transform:translateY(120px);
}


.xincard{
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:24px;
    gap:4px;
    flex-direction: column;
    font-weight:bold;
    text-align:center;
    font-size:32px;
    background-image: linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(207, 217, 232, 1));
}
.app-icon{
    border-radius:100px;
    height:52px;
    width:52px;
    border-radius:100px;
    background:#fff;
    box-shadow:0px 4px 16px #0002;
}
.app-image{
    width:70vw;
}
.xin-reveal{
    opacity:0;
    transform:translateY(18px);
    transition: opacity 0.8s cubic-bezier(.16,1,.3,1), transform 0.8s cubic-bezier(.16,1,.3,1);
    transition-delay: var(--xin-delay, 0s);
    will-change: opacity, transform;
}
.xin-reveal.is-visible{
    opacity:1;
    transform:translateY(0);
}
.app-name{
    display:inline-block;
}
.goodcard{ 

    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:24px;
    text-align:center;
    gap:4px;
    font-size:32px;
    flex-direction: column;
    background-image: radial-gradient(circle at 50% 190%, rgba(0, 13, 25, 1), rgb(0 122 82) 66%, rgb(0 128 82) 73%, rgb(0 117 79) 80%, rgb(0 92 71) 87%, rgba(0, 13, 25, 1));
    color:#fff;
    padding-bottom:24px;
    }
    .goodxiao{
      padding:24px 32px;
      border-radius:100px;
      background-color:color(display-p3 0.4 1 0.573 / 1);
      font-weight:bold;
      color:#000;
    }
    .goodxiao.white{
      background-color:#fff;
      border-radius:12px;
      padding:24px;
    }
    .primary-btn{
      padding:8px 16px;
      border-radius:100px;
      font-weight:bold;
      border:none;
    }
    header{
      position:fixed;
      background:#fffb;
      color:#000;
      top:0;
      left:0;
      width:100vw;
      z-index:9999;
      display:flex;
      justify-content:center;
      align-items:center;
      backdrop-filter:blur(16px);
      padding:12px 0;
      gap:24px;
      font-size:13px;
    }
    a{
          text-decoration: none;
        color:#000;
    }
    .products-marquee-section{
      padding:64px 0;
      text-align:center;
      overflow:hidden;
    }
    .products-marquee-title{
      margin:0;
      font-size:44px;
      line-height:1.2;
      font-variation-settings:
      "slnt" 0,
      "wdth" 132,
      "GRAD" 0,
      "ROND" 30;
    }
    .products-marquee{
      width:min(1120px, 92vw);
      margin:26px auto 0;
      overflow:hidden;
      mask-image: linear-gradient(to right, transparent, #000 8%, #000 92%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, #000 8%, #000 92%, transparent);
    }
    .products-marquee-track{
      display:flex;
      width:max-content;
      animation: products-marquee-scroll 34s linear infinite;
      height:120px;
    }
    .products-marquee-group{
      display:flex;
      align-items:center;
      gap:14px;
      padding-right:14px;
    }
    .products-marquee-item {
    display: block;
    width: 96px;
    border-radius: 100px;
    overflow: hidden;
    box-shadow: 0 2px 13px #0002;
    background: #fff;
    transform: translateZ(0);
    height: 96px;
}
    .products-marquee-item img{
      display:block;
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .products-list-btn{
      margin-top:24px;
      background:#fff;
      color:#07342a;
    }
    @keyframes products-marquee-scroll{
      from{
        transform:translateX(0);
      }
      to{
        transform:translateX(-50%);
      }
    }
    @media (max-width:720px){
      .products-marquee-title{
        font-size:34px;
      }
      .products-marquee-item{
        width:130px;
      }
      .products-marquee-item img{
        height:90px;
      }
    }
    @media (prefers-reduced-motion: reduce){
      .products-marquee-track{
        animation:none;
      }
    }
    footer{
      padding:48px 0px;
      text-align:center;
      font-size:20px;

    }
</style>

<script>

    conic-gradient(from var(--${NS}-before-from-3), #D6F5FF 0deg, #00FF4400 var(--${NS}-stop)),

<script>
(() => {
  const reveals = document.querySelectorAll('.xincard .xin-reveal, .goodcard .xin-reveal');
  if (!reveals.length) return;

  const show = el => el.classList.add('is-visible');

  if (!('IntersectionObserver' in window)) {
    reveals.forEach(show);
    return;
  }

  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      show(entry.target);
      obs.unobserve(entry.target);
    });
  }, {
    threshold: 0.5,
    rootMargin: "0px"
  });

  reveals.forEach(el => observer.observe(el));
})();
</script>
