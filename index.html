<script>
(() => {
  "use strict";

  const NS = "firstGradientAnim3958";
  const target = document.querySelector(".first");

  if (!target) {
    console.warn(`[${NS}] .first が見つかりませんでした。`);
    return;
  }

  const styleId = `${NS}-style`;
  document.getElementById(styleId)?.remove();

  const style = document.createElement("style");
  style.id = styleId;

  style.textContent = `
@property --${NS}-intro-from {
  syntax: "<angle>";
  inherits: false;
  initial-value: 180deg;
}

@property --${NS}-stop {
  syntax: "<angle>";
  inherits: false;
  initial-value: 0deg;
}

@property --${NS}-from-1 {
  syntax: "<angle>";
  inherits: false;
  initial-value: 45deg;
}

@property --${NS}-from-2 {
  syntax: "<angle>";
  inherits: false;
  initial-value: -45deg;
}

@property --${NS}-from-3 {
  syntax: "<angle>";
  inherits: false;
  initial-value: 135deg;
}

@property --${NS}-from-4 {
  syntax: "<angle>";
  inherits: false;
  initial-value: -135deg;
}

@property --${NS}-before-from-1 {
  syntax: "<angle>";
  inherits: false;
  initial-value: 180deg;
}

@property --${NS}-before-from-2 {
  syntax: "<angle>";
  inherits: false;
  initial-value: 0deg;
}

@property --${NS}-before-from-3 {
  syntax: "<angle>";
  inherits: false;
  initial-value: 90deg;
}

@property --${NS}-before-from-4 {
  syntax: "<angle>";
  inherits: false;
  initial-value: -90deg;
}

@property --${NS}-before-opacity {
  syntax: "<number>";
  inherits: false;
  initial-value: 0;
}

.first {
  --${NS}-intro-from: 360deg;
  --${NS}-stop: 0deg;

  --${NS}-from-1: 45deg;
  --${NS}-from-2: -45deg;
  --${NS}-from-3: 135deg;
  --${NS}-from-4: -135deg;

  --${NS}-before-from-1: 180deg;
  --${NS}-before-from-2: 0deg;
  --${NS}-before-from-3: 90deg;
  --${NS}-before-from-4: -90deg;
  --${NS}-before-opacity: 0;

  background-image:
    conic-gradient(
      from var(--${NS}-intro-from),
      rgba(62, 255, 73, 1) 0deg,
      rgba(92, 241, 166, 1) 161deg,
      rgba(0, 255, 255, 1) 300deg,
      rgba(255, 255, 255, 1) 360deg 360deg
    );

  animation:
    ${NS}-intro 1s cubic-bezier(.46,0,.47,.34) forwards,
    ${NS}-main 3s cubic-bezier(.08,.74,.08,1) 1s forwards;
}

.first::before {
  opacity: var(--${NS}-before-opacity);

  background-image:
    conic-gradient(from var(--${NS}-before-from-1), #00C464 0deg, #00FF8200 var(--${NS}-stop)),
    conic-gradient(from var(--${NS}-before-from-2), #9AFF8C 0deg, #C3FF0000 var(--${NS}-stop)),
    conic-gradient(from var(--${NS}-before-from-3), #D6F5FF 0deg, #00FF4400 var(--${NS}-stop)),
    conic-gradient(from var(--${NS}-before-from-4), #51FCFF 0deg, #00FF4400 var(--${NS}-stop));
    
  animation: ${NS}-before 3s cubic-bezier(.08,.74,.08,1) 1s forwards;
  
}

@keyframes ${NS}-intro {
  to {
    --${NS}-intro-from: 45deg;
  }
}

@keyframes ${NS}-main {
  0% {
    --${NS}-stop: 0deg;

    --${NS}-from-1: 45deg;
    --${NS}-from-2: -45deg;
    --${NS}-from-3: 135deg;
    --${NS}-from-4: -135deg;

    background-image:
      conic-gradient(from var(--${NS}-from-2), #a8ffeb 0deg, #C3FF0000 var(--${NS}-stop)),
      conic-gradient(from var(--${NS}-from-3), #e7fff9 0deg, #00FF4400 var(--${NS}-stop)),
      conic-gradient(from var(--${NS}-from-4), #f8ffa7 0deg, #00FF4400 var(--${NS}-stop)),
      conic-gradient(
        from var(--${NS}-from-1),
        rgba(62, 255, 73, 1) 0deg,
        rgba(92, 241, 166, 1) 161deg,
        rgba(0, 255, 255, 1) 300deg,
        rgba(255, 255, 255, 1) 360deg 360deg
      );
  }

  100% {
    --${NS}-stop: 45deg;

    --${NS}-from-1: 0deg;
    --${NS}-from-2: -90deg;
    --${NS}-from-3: 90deg;
    --${NS}-from-4: -180deg;

    background-image:
      conic-gradient(from var(--${NS}-from-2), #a8ffeb 0deg, #C3FF0000 var(--${NS}-stop)),
      conic-gradient(from var(--${NS}-from-3), #e7fff9 0deg, #00FF4400 var(--${NS}-stop)),
      conic-gradient(from var(--${NS}-from-4), #f8ffa7 0deg, #00FF4400 var(--${NS}-stop)),
      conic-gradient(
        from var(--${NS}-from-1),
        rgba(62, 255, 73, 1) 0deg,
        rgba(92, 241, 166, 1) 161deg,
        rgba(0, 255, 255, 1) 300deg,
        rgba(255, 255, 255, 1) 360deg 360deg
      );
  }
}

@keyframes ${NS}-before {
  0% {
    --${NS}-before-opacity: 1;
    --${NS}-stop: 0deg;

    --${NS}-before-from-1: 180deg;
    --${NS}-before-from-2: 0deg;
    --${NS}-before-from-3: 90deg;
    --${NS}-before-from-4: -90deg;
  }

  100% {
    --${NS}-before-opacity: 1;
    --${NS}-stop: 45deg;

    --${NS}-before-from-1: 135deg;
    --${NS}-before-from-2: -45deg;
    --${NS}-before-from-3: 45deg;
    --${NS}-before-from-4: -135deg;
  }
}
`;

  document.head.appendChild(style);

  target.addEventListener(
    "animationend",
    event => {
      if (!event.animationName.startsWith(NS)) return;
      console.info(`[${NS}] アニメーション完了: ${event.animationName}`);
    },
    { passive: true }
  );

  console.info(`[${NS}] before非表示 → intro → 逆方向main/before を開始しました。`);
})();
</script>

<script>
  window.addEventListener('load', () => {
    // 3秒（3000ミリ秒）待機
    setTimeout(() => {
        // .first 内の .small と .message を取得
        const elements = document.querySelectorAll('.first .small, .first .message');
        
        // 取得した要素から .before クラスを削除
        elements.forEach(el => {
            el.classList.remove('before');
        });
    }, 100);
});
</script>

<script>
(() => {
  const reveals = document.querySelectorAll('.xincard .xin-reveal, .goodcard .xin-reveal');
  if (!reveals.length) return;

  const show = el => el.classList.add('is-visible');

  if (!('IntersectionObserver' in window)) {
    reveals.forEach(show);
    return;
  }

  const observer = new IntersectionObserver((entries, obs) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      show(entry.target);
      obs.unobserve(entry.target);
    });
  }, {
    threshold: 0.5,
    rootMargin: "0px"
  });

  reveals.forEach(el => observer.observe(el));
})();
</script>
